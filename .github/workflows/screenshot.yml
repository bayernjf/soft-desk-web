name: Generate Preview Screenshot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - public/preview.png

permissions:
  actions: write
  contents: write

jobs:
  screenshot:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Start local preview
        run: npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/softdesk-preview.log 2>&1 &

      - name: Wait for local preview
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/softdesk-preview.log
          exit 1

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.54.0 install --with-deps chromium

      - name: Generate preview image
        run: |
          npx --yes playwright@1.54.0 screenshot \
            --device="Desktop Chrome" \
            --viewport-size="1200,630" \
            --wait-for-timeout=1000 \
            http://127.0.0.1:4173/ \
            public/preview.png

      - name: Commit preview image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/preview.png
          git diff --cached --quiet || git commit -m "chore(preview): update SoftDesk image"
          git push

      - name: Trigger production deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
